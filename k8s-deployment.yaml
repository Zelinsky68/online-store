---
apiVersion: v1
kind: Namespace
metadata:
  name: online-store
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: online-store
  namespace: online-store
  labels:
    app: online-store
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: online-store
  template:
    metadata:
      labels:
        app: online-store
        version: v1
    spec:
      containers:
      - name: online-store
        image: cr.yandex/crpfn7u4kvn0913i8kvt/online-store:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "production"
        - name: JAVA_OPTS
          value: "-Xms512m -Xmx1024m"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: online-store-service
  namespace: online-store
  labels:
    app: online-store
spec:
  selector:
    app: online-store
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
    name: http
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: online-store-hpa
  namespace: online-store
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: online-store
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
