---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: online-store
  namespace: online-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: online-store
  template:
    metadata:
      labels:
        app: online-store
    spec:
      containers:
      - name: online-store
        image: cr.yandex/crpfn7u4kvn0913i8kvt/online-store:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "production"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres:5432/onlinestore"
        - name: SPRING_DATASOURCE_USERNAME
          value: "onlinestore"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "onlinestore123"
        - name: SPRING_JPA_HIBERNATE_DDL_AUTO
          value: "update"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: online-store-service
  namespace: online-store
spec:
  selector:
    app: online-store
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: LoadBalancer
