apiVersion: apps/v1
kind: Deployment
metadata:
  name: online-store
  namespace: online-store
  labels:
    app: online-store
spec:
  replicas: 2
  selector:
    matchLabels:
      app: online-store
  template:
    metadata:
      labels:
        app: online-store
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: online-store
        image: ghcr.io/zelinsky68/online-store:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: JAVA_OPTS
          value: "-Xmx512m -Xms256m"
---
apiVersion: v1
kind: Service
metadata:
  name: online-store-service
  namespace: online-store
  labels:
    app: online-store
spec:
  type: LoadBalancer
  selector:
    app: online-store
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
