# Тестовая база данных H2
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA настройки для тестов
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Отключаем Flyway для тестов
spring.flyway.enabled=false

# Логирование SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Настройки JWT для тестов (добавляем все возможные варианты)
app.jwtSecret=testSecretKeyForJwtTokenGenerationThatIsLongEnoughForHS512
app.jwtExpirationMs=86400000
jwt.secret=testSecretKeyForJwtTokenGenerationThatIsLongEnoughForHS512
jwt.expiration=86400000

# Отключаем безопасность для тестов
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
