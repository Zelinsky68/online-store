# Тестовая база данных H2
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA настройки для тестов
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Отключаем Flyway для тестов
spring.flyway.enabled=false

# Настройки JWT для тестов
jwt.secret=testSecretKeyForJwtTokenGenerationThatIsLongEnoughForHS512
jwt.expiration=86400000
app.jwtSecret=testSecretKeyForJwtTokenGenerationThatIsLongEnoughForHS512
app.jwtExpirationMs=86400000

# Логирование
logging.level.org.springframework=INFO
logging.level.com.onlinestore=DEBUG
